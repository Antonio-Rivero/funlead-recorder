name: privacy-gate
on:
  push:
  pull_request:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: secret-scan (generic rules; private rules load from local file if present)
        run: bash scripts/secret-scan.sh
      - name: no agent-memory tracked
        run: |
          if git ls-files | grep -qi agent-memory; then
            echo "agent-memory file is tracked"; exit 1
          fi
          echo "ok: no agent-memory tracked"
      - name: gitleaks (generic secrets — pinned version + SHA256 verified, no Action license)
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb" # gitleaks_8.30.1_linux_x64.tar.gz
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "gitleaks asset: $url"
          curl -fsSL "$url" -o gitleaks.tgz
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks detect --config .gitleaks.toml --no-git --redact
